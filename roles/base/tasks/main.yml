- name: Install base packages
  apt:
    name:
      - git
      - curl
      - htop
      - ca-certificates
    state: present
    update_cache: yes

- name: Create node user
  user:
    name: "{{ node_user }}"
    shell: /bin/bash
    groups: sudo,docker
    append: yes
    create_home: yes

- name: Clone repo
  git:
    repo: "https://github.com/OnyxJeff/{{ repo_name }}.git"
    dest: "{{ node_home }}/{{ repo_name }}"
    update: yes
  become: yes
  become_user: "{{ node_user }}"
---
###########################################################
# Packages
###########################################################

- name: Install OLED dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - gcc
      - make
      - i2c-tools
      - libi2c-dev
    state: present
    update_cache: true

###########################################################
# Enable I2C
###########################################################

- name: Enable I2C
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?dtparam=i2c_arm='
    line: 'dtparam=i2c_arm=on'
  notify: Reboot Raspberry Pi

###########################################################
# Kernel module (needed for /dev/i2c-1)
###########################################################

- name: Ensure i2c-dev module loads at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/i2c.conf
    content: |
      i2c-dev

###########################################################
# Groups
###########################################################

- name: Ensure i2c group exists
  ansible.builtin.group:
    name: i2c
    state: present

- name: Add user to i2c group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: i2c
    append: true

###########################################################
# Install files
###########################################################

- name: Copy UCTRONICS display project
  ansible.builtin.synchronize:
    src: U6143_ssd1306/
    dest: "{{ oled_install_dir }}/"

###########################################################
# Build (clean + make)
###########################################################

- name: Clean display build
  ansible.builtin.command:
    cmd: make clean
    chdir: "{{ oled_install_dir }}/C"

- name: Build display program
  ansible.builtin.command:
    cmd: make
    chdir: "{{ oled_install_dir }}/C"

- name: Verify display binary exists
  ansible.builtin.stat:
    path: "{{ oled_install_dir }}/C/display"
  register: display_bin

- name: Fail if display binary missing
  ansible.builtin.fail:
    msg: "OLED display binary not found after build"
  when: not display_bin.stat.exists

###########################################################
# Service
###########################################################

- name: Install OLED systemd service
  ansible.builtin.template:
    src: uctronics-display.service.j2
    dest: "/etc/systemd/system/{{ oled_service_name }}.service"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart OLED service

###########################################################
# Enable service
###########################################################

- name: Enable OLED service
  ansible.builtin.systemd:
    name: "{{ oled_service_name }}"
    enabled: true
    state: started

###########################################################
# Restart Raspberry Pi
###########################################################

- name: Force Raspberry Pi reboot after OLED setup
  ansible.builtin.reboot:
    msg: "Forcing reboot after OLED setup"
    reboot_timeout: 900
    pre_reboot_delay: 5
    post_reboot_delay: 30
---
###########################################################
# Packages
###########################################################

- name: Install OLED dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - gcc
      - make
      - i2c-tools
      - libi2c-dev
    state: present
    update_cache: true

###########################################################
# Enable I2C
###########################################################

- name: Enable I2C
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    regexp: '^#?dtparam=i2c_arm='
    line: 'dtparam=i2c_arm=on'
  notify: Reboot Raspberry Pi

###########################################################
# Groups
###########################################################

- name: Add user to i2c group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: i2c
    append: true

###########################################################
# Install files
###########################################################

- name: Copy UCTRONICS display project
  ansible.builtin.copy:
    src: U6143_ssd1306/
    dest: "{{ oled_install_dir }}/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

###########################################################
# Configure header
###########################################################

- name: Configure OLED header
  ansible.builtin.template:
    src: ssd1306_i2c.h.j2
    dest: "{{ oled_install_dir }}/C/ssd1306_i2c.h"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

###########################################################
# Build
###########################################################

- name: Build display program
  ansible.builtin.command:
    cmd: make
    chdir: "{{ oled_install_dir }}/C"

###########################################################
# Service
###########################################################

- name: Install OLED systemd service
  ansible.builtin.template:
    src: uctronics-display.service.j2
    dest: "/etc/systemd/system/{{ oled_service_name }}.service"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart OLED service

###########################################################
# Ensure service enabled
###########################################################

- name: Enable OLED service
  ansible.builtin.systemd:
    name: "{{ oled_service_name }}"
    enabled: true
    state: started
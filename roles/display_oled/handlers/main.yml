---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart OLED service
  ansible.builtin.systemd:
    name: "{{ oled_service_name }}"
    enabled: true
    state: restarted

- name: Reboot Raspberry Pi
  ansible.builtin.reboot:
    msg: "Reboot triggered by display_oled role"
    reboot_timeout: 900
    pre_reboot_delay: 5
    post_reboot_delay: 30
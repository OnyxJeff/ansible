---
###########################################################
# Docker stack: nebula-sync
###########################################################

- name: Ensure Docker Compose plugin is installed
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
    update_cache: true

###########################################################
# Deploy nebula-sync stack files
###########################################################

- name: Copy nebula-sync stack to host
  ansible.builtin.synchronize:
    src: nebula-sync/
    dest: "{{ nebula_sync_dir }}/"
    recursive: true

###########################################################
# Copy .env file
###########################################################

- name: Copy nebula.env files
  ansible.builtin.template:
    src: nebula.env.j2
    dest: "{{ nebula_sync_dir }}/.env"
    mode: "0644"

- name: Copy daily.env files
  ansible.builtin.template:
    src: nebula_daily.env.j2
    dest: "{{ nebula_sync_dir }}/daily/.env"
    mode: "0644"

###########################################################
# Create Cron job for sync(s)
###########################################################

- name: Configure Nebula Sync cron jobs
  become: true
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour }}"
    job: "{{ item.job }}"
    user: root
  loop:
    - name: "Nebula Sync - every 15 minutes"
      minute: "*/15"
      hour: "*"
      job: "cd /home/{{ ansible_user }}/nebula-sync && flock -n /tmp/nebula-sync.lock docker compose run --rm nebula-sync"

    - name: "Nebula Sync - daily Discord report"
      minute: "0"
      hour: "8"
      job: "cd /home/{{ ansible_user }}/nebula-sync/daily && flock -n /tmp/nebula-sync.lock docker compose run --rm nebula-sync"
---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - htop
      - ca-certificates
      - vim
      - nano
    state: present

- name: Ensure base tools directory exists
  ansible.builtin.file:
    path: /opt
    state: directory
    mode: '0755'

- name: Ensure scripts, logs, and backup_logs directories exist
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - scripts
    - logs
    - backup_logs
    
- name: Copy apt-get-autoupdater.sh script to the scripts directory
  ansible.builtin.template:
    src: apt-get-autoupdater.sh.j2
    dest: "/home/{{ ansible_user }}/scripts/apt-get-autoupdater.sh"
    mode: '0755'